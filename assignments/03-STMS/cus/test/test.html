<!DOCTYPE html>
<html>
<head>
    <title>TMS Simulator - Test CUS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 400px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #218838; }
        #log { margin-top: 20px; font-size: 0.9em; color: #555; }
    </style>
</head>
<body>

<div class="card">
    <h2>TMS Simulator</h2>
    <p>Invia il livello d'acqua al CUS</p>
    <input type="number" id="level" placeholder="Livello acqua (0-100)" value="45">
    <button onclick="sendData()">Invia via MQTT</button>
    <div id="log">Stato: Disconnesso</div>
</div>

<script>
    // Cambiata porta a 8000 e aggiunto path /mqtt
    const client = mqtt.connect('ws://broker.mqtt-dashboard.com:8000/mqtt');
    const topic = "it/unibo/esiot/2026/tank/level"; // Topic UNIVOCO

    client.on('connect', () => {
        document.getElementById('log').innerText = "Stato: Connesso al Broker";
    });

    client.on('error', (err) => {
        document.getElementById('log').innerText = "Errore: " + err;
    });

    function sendData() {
        const val = document.getElementById('level').value;
        client.publish(topic, val, { qos: 1 }, (err) => {
            if (err) {
                console.error("Errore invio:", err);
            } else {
                document.getElementById('log').innerText = "Inviato: " + val;
                console.log("Published:", val);
            }
        });
    }
</script>

</body>
</html>
